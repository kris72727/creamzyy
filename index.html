<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creamzy Products</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:url("background.png");
background-size:cover;
background-position:center;
}

/* logo */

.logo{
position:fixed;
top:20px;
left:20px;
}

.logo img{
width:90px;
}

/* pages */

.page{
display:none;
padding:120px 20px;
color:white;
}

.active{
display:block;
}

/* buttons */

button{
padding:12px 25px;
margin-top:30px;
font-size:16px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

/* products */

.products{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.product{
background:white;
color:black;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.product img{
width:100%;
border-radius:8px;
}

.price{
color:green;
font-weight:bold;
font-size:18px;
}

</style>
</head>

<body>

<!-- LOGO -->

<div class="logo">
<img src="logo.png">
</div>


<!-- PAGE 1 -->

<div class="page active" id="page1">

<h1>Welcome to Creamzy Products</h1>

<p>
Welcome to our Creamzy dairy product showcase.
Here you can explore our fresh and delicious dairy products.
</p>

<button onclick="showPage(2)">Next</button>

</div>


<!-- PAGE 2 -->

<div class="page" id="page2">

<h1>Creamzy Products</h1>

<h2>Presented by</h2>

<h3>creamzyh</h3>

<button onclick="showPage(3)">View Products</button>

</div>


<!-- PAGE 3 -->

<div class="page" id="page3">

<h1>Our Products</h1>

<div class="products">

<div class="product">

<img src="paneer.jpeg">

<h3>Paneer</h3>

<p class="price">₹200</p>

<button>Buy</button>

</div>


<div class="product">

<img src="smoothie.jpeg">

<h3>Smoothie</h3>

<p class="price">₹149</p>

<button>Buy</button>

</div>


<div class="product">

<img src="khoya.jpeg">

<h3>Khoya</h3>

<p class="price">₹120</p>

<button>Buy</button>

</div>

</div>

<button onclick="showPage(1)">Home</button>

</div>


<script>

function showPage(page){

document.querySelectorAll(".page").forEach(function(p){
p.classList.remove("active")
})

document.getElementById("page"+page).classList.add("active")

}

</script>

</body>
</html>
